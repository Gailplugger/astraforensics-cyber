<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cert-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B91C1C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Certificate background -->
  <rect x="20" y="20" width="360" height="260" rx="10" fill="url(#cert-bg)" stroke="#D97706" stroke-width="2"/>
  
  <!-- Decorative border -->
  <rect x="35" y="35" width="330" height="230" rx="5" fill="none" stroke="#D97706" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Ribbon -->
  <g transform="translate(320, 30)">
    <path d="M0 0 L40 0 L35 20 L40 40 L0 40 L5 20 Z" fill="url(#ribbon)"/>
    <circle cx="20" cy="20" r="12" fill="#FCD34D"/>
    <text x="20" y="25" text-anchor="middle" fill="#92400E" font-weight="bold" font-size="14">★</text>
  </g>
  
  <!-- Header text -->
  <text x="200" y="70" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#92400E">CERTIFICATE</text>
  <text x="200" y="95" text-anchor="middle" font-family="serif" font-size="16" fill="#B45309">of Achievement</text>
  
  <!-- Main content area -->
  <text x="200" y="130" text-anchor="middle" font-size="14" fill="#451A03">This certifies that</text>
  <text x="200" y="155" text-anchor="middle" font-size="20" font-weight="bold" fill="#92400E">[Student Name]</text>
  <text x="200" y="180" text-anchor="middle" font-size="14" fill="#451A03">has successfully completed</text>
  <text x="200" y="205" text-anchor="middle" font-size="16" font-weight="semibold" fill="#B45309">[Module Name]</text>
  
  <!-- Date line -->
  <line x1="80" y1="240" x2="180" y2="240" stroke="#D97706" stroke-width="1"/>
  <text x="130" y="255" text-anchor="middle" font-size="12" fill="#92400E">Date</text>
  
  <!-- Signature line -->
  <line x1="220" y1="240" x2="320" y2="240" stroke="#D97706" stroke-width="1"/>
  <text x="270" y="255" text-anchor="middle" font-size="12" fill="#92400E">AstraForensics</text>
  
  <!-- Decorative elements -->
  <g opacity="0.3">
    <circle cx="80" cy="120" r="3" fill="#D97706"/>
    <circle cx="320" cy="120" r="3" fill="#D97706"/>
    <circle cx="80" cy="180" r="3" fill="#D97706"/>
    <circle cx="320" cy="180" r="3" fill="#D97706"/>
  </g>
</svg>