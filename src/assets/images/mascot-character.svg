<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mascot-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB6C1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hair-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#mascot-bg)" stroke="#FF69B4" stroke-width="3"/>
  
  <!-- Character head -->
  <ellipse cx="100" cy="90" rx="35" ry="40" fill="#FDBCB4"/>
  
  <!-- Hair -->
  <path d="M65 60 Q75 45 100 50 Q125 45 135 60 L135 75 Q125 65 115 70 Q105 65 100 70 Q95 65 85 70 Q75 65 65 75 Z" fill="url(#hair-gradient)"/>
  
  <!-- Hair accessories (anime style) -->
  <circle cx="80" cy="65" r="3" fill="#FF1493"/>
  <circle cx="120" cy="65" r="3" fill="#FF1493"/>
  
  <!-- Eyes (large anime style) -->
  <ellipse cx="90" cy="85" rx="10" ry="15" fill="white"/>
  <ellipse cx="110" cy="85" rx="10" ry="15" fill="white"/>
  
  <!-- Eye pupils -->
  <circle cx="90" cy="87" r="7" fill="#2C3E50"/>
  <circle cx="110" cy="87" r="7" fill="#2C3E50"/>
  
  <!-- Eye highlights -->
  <circle cx="92" cy="82" r="3" fill="white"/>
  <circle cx="112" cy="82" r="3" fill="white"/>
  <circle cx="88" cy="85" r="1" fill="white"/>
  <circle cx="108" cy="85" r="1" fill="white"/>
  
  <!-- Eyebrows -->
  <path d="M82 75 Q90 72 98 75" stroke="#4A90E2" stroke-width="2" fill="none"/>
  <path d="M102 75 Q110 72 118 75" stroke="#4A90E2" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="95" rx="1" ry="2" fill="#F4A7A7"/>
  
  <!-- Mouth (happy) -->
  <path d="M92 105 Q100 112 108 105" stroke="#E74C3C" stroke-width="2" fill="none"/>
  
  <!-- Blush -->
  <circle cx="75" cy="100" r="5" fill="#FFB6C1" opacity="0.7"/>
  <circle cx="125" cy="100" r="5" fill="#FFB6C1" opacity="0.7"/>
  
  <!-- Body -->
  <rect x="75" y="125" width="50" height="40" rx="8" fill="#3498DB"/>
  
  <!-- Security badge on outfit -->
  <circle cx="88" cy="140" r="6" fill="#FFD700"/>
  <path d="M85 140 L90 137 L91 142 L87 143 Z" fill="#E67E22"/>
  
  <!-- Arms -->
  <ellipse cx="60" cy="140" rx="8" ry="20" fill="#FDBCB4"/>
  <ellipse cx="140" cy="140" rx="8" ry="20" fill="#FDBCB4"/>
  
  <!-- Hands holding shield -->
  <circle cx="60" cy="155" r="5" fill="#FDBCB4"/>
  <circle cx="140" cy="155" r="5" fill="#FDBCB4"/>
  
  <!-- Cyber shield -->
  <path d="M90 160 L110 160 L115 175 L100 180 L85 175 Z" fill="#4CAF50" opacity="0.8"/>
  <circle cx="100" cy="170" r="5" fill="white"/>
  <path d="M97 170 L99 172 L103 168" stroke="#4CAF50" stroke-width="2" fill="none"/>
  
  <!-- Sparkles around character -->
  <g fill="#FFD700">
    <path d="M40 40 L42 45 L47 43 L45 48 L50 50 L45 52 L47 57 L42 55 L40 60 L38 55 L33 57 L35 52 L30 50 L35 48 L33 43 L38 45 Z"/>
    <path d="M150 30 L151 33 L154 32 L153 35 L156 36 L153 37 L154 40 L151 39 L150 42 L149 39 L146 40 L147 37 L144 36 L147 35 L146 32 L149 33 Z"/>
    <circle cx="170" cy="70" r="2"/>
    <circle cx="30" cy="130" r="2"/>
    <circle cx="160" cy="160" r="1.5"/>
    <circle cx="20" cy="90" r="1"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4A90E2">AstraForensics</text>
</svg>