<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="success-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="character-hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF1493;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#success-bg)"/>
  
  <!-- Success burst background -->
  <g opacity="0.3">
    <path d="M200 50 L210 80 L240 70 L220 100 L250 110 L220 130 L240 160 L210 150 L200 180 L190 150 L160 160 L180 130 L150 110 L180 100 L160 70 L190 80 Z" fill="#4CAF50"/>
  </g>
  
  <!-- Main character -->
  <g transform="translate(150, 100)">
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="40" ry="45" fill="#FDBCB4"/>
    
    <!-- Hair -->
    <path d="M-35 -25 Q-25 -45 0 -40 Q25 -45 35 -25 L35 -10 Q25 -20 15 -15 Q5 -20 0 -15 Q-5 -20 -15 -15 Q-25 -20 -35 -10 Z" fill="url(#character-hair)"/>
    
    <!-- Hair clips -->
    <circle cx="-20" cy="-30" r="3" fill="#FFD700"/>
    <circle cx="20" cy="-30" r="3" fill="#FFD700"/>
    
    <!-- Eyes (excited/happy) -->
    <ellipse cx="-12" cy="-5" rx="8" ry="12" fill="white"/>
    <ellipse cx="12" cy="-5" rx="8" ry="12" fill="white"/>
    
    <!-- Eye pupils (happy crescents) -->
    <path d="M-16 -5 Q-12 -10 -8 -5 Q-12 0 -16 -5" fill="#2C3E50"/>
    <path d="M8 -5 Q12 -10 16 -5 Q12 0 8 -5" fill="#2C3E50"/>
    
    <!-- Eye highlights -->
    <circle cx="-10" cy="-8" r="2" fill="white"/>
    <circle cx="14" cy="-8" r="2" fill="white"/>
    
    <!-- Eyebrows (excited) -->
    <path d="M-18 -15 Q-12 -18 -6 -15" stroke="#FF1493" stroke-width="2" fill="none"/>
    <path d="M6 -15 Q12 -18 18 -15" stroke="#FF1493" stroke-width="2" fill="none"/>
    
    <!-- Nose -->
    <ellipse cx="0" cy="5" rx="1" ry="2" fill="#F4A7A7"/>
    
    <!-- Mouth (big happy smile) -->
    <path d="M-15 15 Q0 25 15 15" stroke="#E74C3C" stroke-width="3" fill="none"/>
    
    <!-- Blush (excited) -->
    <circle cx="-25" cy="10" r="6" fill="#FFB6C1" opacity="0.8"/>
    <circle cx="25" cy="10" r="6" fill="#FFB6C1" opacity="0.8"/>
    
    <!-- Body -->
    <rect x="-25" y="35" width="50" height="45" rx="8" fill="#4CAF50"/>
    
    <!-- Success badge -->
    <circle cx="0" cy="50" r="8" fill="#FFD700"/>
    <path d="M-3 50 L0 47 L3 50 L0 53 Z" fill="#4CAF50"/>
    <text x="0" y="53" text-anchor="middle" font-size="8" fill="white">✓</text>
    
    <!-- Arms (raised in celebration) -->
    <ellipse cx="-35" cy="45" rx="8" ry="15" fill="#FDBCB4" transform="rotate(-30)"/>
    <ellipse cx="35" cy="45" rx="8" ry="15" fill="#FDBCB4" transform="rotate(30)"/>
    
    <!-- Hands -->
    <circle cx="-40" cy="30" r="5" fill="#FDBCB4"/>
    <circle cx="40" cy="30" r="5" fill="#FDBCB4"/>
  </g>
  
  <!-- Success elements -->
  <g fill="#4CAF50">
    <!-- Checkmarks -->
    <path d="M80 80 L85 85 L95 75" stroke="#4CAF50" stroke-width="3" fill="none"/>
    <path d="M300 120 L305 125 L315 115" stroke="#4CAF50" stroke-width="3" fill="none"/>
    <path d="M100 200 L105 205 L115 195" stroke="#4CAF50" stroke-width="3" fill="none"/>
    
    <!-- Stars -->
    <path d="M70 50 L72 55 L77 53 L75 58 L80 60 L75 62 L77 67 L72 65 L70 70 L68 65 L63 67 L65 62 L60 60 L65 58 L63 53 L68 55 Z"/>
    <path d="M320 60 L321 63 L324 62 L323 65 L326 66 L323 67 L324 70 L321 69 L320 72 L319 69 L316 70 L317 67 L314 66 L317 65 L316 62 L319 63 Z"/>
    
    <!-- Sparkles -->
    <circle cx="90" cy="150" r="2"/>
    <circle cx="310" cy="180" r="2"/>
    <circle cx="50" cy="120" r="1.5"/>
    <circle cx="350" cy="140" r="1.5"/>
  </g>
  
  <!-- Trophy -->
  <g transform="translate(320, 200)">
    <rect x="0" y="0" width="20" height="25" rx="3" fill="#FFD700"/>
    <circle cx="10" cy="12" r="8" fill="#FFA000"/>
    <rect x="5" y="25" width="10" height="5" fill="#8D6E63"/>
    <rect x="0" y="30" width="20" height="3" fill="#5D4037"/>
    <text x="10" y="18" text-anchor="middle" font-size="8" fill="#FFF">1</text>
  </g>
  
  <!-- Confetti -->
  <g>
    <rect x="60" y="40" width="3" height="3" fill="#FF6B6B" transform="rotate(45)"/>
    <rect x="340" y="80" width="3" height="3" fill="#4ECDC4" transform="rotate(30)"/>
    <rect x="80" y="180" width="3" height="3" fill="#45B7D1" transform="rotate(60)"/>
    <rect x="300" y="220" width="3" height="3" fill="#96CEB4" transform="rotate(45)"/>
    <rect x="120" y="60" width="3" height="3" fill="#FECA57" transform="rotate(30)"/>
    <rect x="280" y="160" width="3" height="3" fill="#FF9FF3" transform="rotate(60)"/>
  </g>
  
  <!-- Speech bubble -->
  <g transform="translate(50, 150)">
    <ellipse cx="0" cy="0" rx="40" ry="25" fill="white" stroke="#4CAF50" stroke-width="2"/>
    <path d="M-15 20 L-25 35 L-5 25" fill="white" stroke="#4CAF50" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-size="10" font-weight="bold" fill="#4CAF50">Great Job!</text>
    <text x="0" y="5" text-anchor="middle" font-size="8" fill="#666">You earned a</text>
    <text x="0" y="15" text-anchor="middle" font-size="8" fill="#666">certificate!</text>
  </g>
  
  <!-- Bottom text -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4CAF50">Mission Accomplished! 🎉</text>
</svg>