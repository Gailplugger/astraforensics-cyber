<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shield-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="code-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#F8FAFC"/>
  
  <!-- Circuit pattern background -->
  <g opacity="0.1">
    <path d="M100 100 L200 100 L200 150 L300 150" stroke="#6366F1" stroke-width="2" fill="none"/>
    <path d="M400 200 L500 200 L500 250 L600 250" stroke="#6366F1" stroke-width="2" fill="none"/>
    <circle cx="200" cy="100" r="5" fill="#6366F1"/>
    <circle cx="300" cy="150" r="5" fill="#6366F1"/>
    <circle cx="500" cy="200" r="5" fill="#6366F1"/>
    <circle cx="600" cy="250" r="5" fill="#6366F1"/>
  </g>
  
  <!-- Main shield -->
  <g transform="translate(350, 150)">
    <path d="M0 0 L60 -30 L60 40 L0 70 L-60 40 L-60 -30 Z" fill="url(#shield-gradient)" opacity="0.9"/>
    <path d="M-30 -10 L30 -10 L30 30 L0 40 L-30 30 Z" fill="white" opacity="0.3"/>
    <circle cx="0" cy="15" r="8" fill="white" opacity="0.8"/>
    <path d="M-5 15 L-2 18 L5 10" stroke="#4F46E5" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Code elements -->
  <g transform="translate(150, 350)">
    <rect x="0" y="0" width="150" height="100" rx="8" fill="url(#code-gradient)" opacity="0.8"/>
    <text x="20" y="25" fill="white" font-family="monospace" font-size="12">&lt;security&gt;</text>
    <text x="20" y="45" fill="white" font-family="monospace" font-size="12">  protect()</text>
    <text x="20" y="65" fill="white" font-family="monospace" font-size="12">&lt;/security&gt;</text>
  </g>
  
  <!-- Network nodes -->
  <g opacity="0.6">
    <circle cx="150" cy="200" r="15" fill="#EC4899"/>
    <circle cx="250" cy="300" r="12" fill="#8B5CF6"/>
    <circle cx="500" cy="350" r="18" fill="#06B6D4"/>
    <circle cx="650" cy="180" r="14" fill="#F59E0B"/>
    
    <!-- Connections -->
    <path d="M150 200 L250 300" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5"/>
    <path d="M250 300 L500 350" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5"/>
    <path d="M500 350 L650 180" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Lock icon -->
  <g transform="translate(550, 400)">
    <rect x="0" y="15" width="40" height="30" rx="5" fill="#374151"/>
    <path d="M10 15 L10 5 C10 0 15 0 20 0 C25 0 30 0 30 5 L30 15" stroke="#374151" stroke-width="3" fill="none"/>
    <circle cx="20" cy="25" r="3" fill="#F3F4F6"/>
  </g>
  
  <!-- Data flow animation paths -->
  <g opacity="0.4">
    <path d="M100 500 Q200 450 300 500 T500 500" stroke="#3B82F6" stroke-width="3" fill="none" stroke-dasharray="10,5">
      <animate attributeName="stroke-dashoffset" values="0;-15" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>